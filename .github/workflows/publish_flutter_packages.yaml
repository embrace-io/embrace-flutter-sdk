name: Publish Package

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Validate but do not push the package'
        type: boolean
        required: true
  workflow_call:
    inputs:
      dry-run:
        description: 'Validate but do not push the package'
        type: boolean
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Package

    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        package: ['embrace_platform_interface', 'embrace_ios', 'embrace_android', 'embrace', 'embrace_dio']
      fail-fast: true
      max-parallel: 1  # Publish the packages in sequential order

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.3.1'
          channel: stable
          cache: true

      - name: Get Publishing Credentials
        run: |
          mkdir -p $XDG_CONFIG_HOME/dart
          cat <<EOF > $XDG_CONFIG_HOME/dart/pub-credentials.json
          ${{ secrets.FLUTTER_PUB_CREDENTIALS }}
          EOF

      - name: Publish Dry Run
        run: |
          cd ${{ matrix.package }}
          flutter config --no-analytics
          flutter pub publish --dry-run

      - name: Publish
        if: ${{ inputs.dry-run == false }}
        run: |
          cd ${{ matrix.package }}
          flutter pub publish -f
