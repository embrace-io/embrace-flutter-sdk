name: embrace

env:
  ANDROID_API_LEVEL: 34
  FLUTTER_VERSION: '3.38.5'

on:
  pull_request:
    paths:
      - ".github/workflows/embrace.yaml"
      - "embrace/**"
      - "embrace_android/**"
      - "embrace_ios/**"
      - "embrace_platform_interface/**"
      - "embrace_dio/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/embrace.yaml"
      - "embrace/**"
      - "embrace_android/**"
      - "embrace_ios/**"
      - "embrace_platform_interface/**"
      - "embrace_dio/**"

permissions:
  contents: read

jobs:
  # Build with minimum supported Flutter/Dart versions
  build_minimum:
    uses: ./.github/workflows/flutter_ci.yaml
    with:
      flutter_channel: stable
      flutter_version: '3.38.5'
      working_directory: embrace

  # Run tests on minimum supported version
  test_minimum:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embrace
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Tests for minimum version
        run: flutter test

  # Run tests on latest stable Flutter/Dart
  test_release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embrace
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Tests for release mode
        run: flutter test --dart-define=dart.vm.product=true test_release/

  android:
    name: Android (Flutter emulator, Ubuntu + KVM)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 60
    defaults:
      run:
        working-directory: embrace/example

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Enable hardware accel for the x86_64 emulator
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Accept Android SDK licenses
        run: yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Write Embrace config (from secrets)
        working-directory: embrace/example
        run: |
          mkdir -p android/app/src/main
          cat > android/app/src/main/embrace-config.json <<'JSON'
          {
            "app_id": "${{ secrets.FLUTTER_TEST_ANDROID_APP_ID }}",
            "api_token": "${{ secrets.FLUTTER_TEST_ANDROID_API_TOKEN }}",
            "ndk_enabled": true,
            "sdk_config": { "app_framework": "flutter" }
          }
          JSON

      # Cache the AVD (x86_64 + API 34); change API here if needed
      - name: AVD cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-${{ runner.arch }}-api${{ env.ANDROID_API_LEVEL }}

      # Prime the cache by creating the snapshot (do NOT disable snapshots)
      - name: Create AVD + snapshot (cache prime)
        if: ${{ steps.avd-cache.outputs.cache-hit != 'true' }}
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: default
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run Flutter integration tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: default
          arch: x86_64
          profile: pixel_5
          cores: 4
          emulator-options: -no-window -no-boot-anim -no-audio -no-metrics
          working-directory: embrace/example
          script: |
            echo "Waiting for Android emulator to be ready..."
            timeout 60 adb wait-for-device shell 'while [ -z "$(getprop sys.boot_completed)" ]; do sleep 1; done' || (echo "ERROR: Emulator did not become ready within 60s" >&2; exit 1)
            adb devices || true
            flutter --version
            flutter devices || true
            DEVICE_ID=$(adb devices | grep -w device | grep emulator | head -1 | cut -f1); [ -n "$DEVICE_ID" ] || { echo "No emulator device found" >&2; exit 1; }; flutter test integration_test -d "$DEVICE_ID" || { adb logcat -d > emulator_logcat.log 2>&1 || true; exit 127; }

      - name: Archive Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-emulator-flutter-results
          path: |
            **/build/reports/**
            **/test-results/**
            emulator_logcat.log
          if-no-files-found: ignore

  ios:
    # Temporarily pinned back from macos-26: GitHub's macos-26 image currently
    # ships host macOS 26.4 (build 25E246) with Xcode 26.5, a combination Apple
    # confirms hangs Simulator/CoreSimulatorService (fixed only once the HOST OS
    # is also updated to 26.5, not just Xcode). Revert to macos-26 once GitHub
    # ships an updated image with a matching host OS build.
    name: iOS (Flutter integration test, macOS-15)
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: embrace/example
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache CocoaPods
        id: cocoapods-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: embrace/example/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('embrace/example/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-
      - name: Cache CocoaPods specs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cocoapods/repos/trunk
          key: pods-specs-${{ runner.os }}-${{ hashFiles('embrace/example/ios/Podfile.lock') }}
      - name: Flutter Pub Get
        run: flutter pub get
      - name: Install CocoaPods dependencies (refresh specs on stale/miss)
        working-directory: embrace/example/ios
        run: |
          set -euo pipefail
          if pod install 2>&1 | tee /tmp/pod_install.log; then
            exit 0
          fi
          if ! grep -qiE 'could not find compatible versions|specs repository is too out-of-date' /tmp/pod_install.log; then
            echo "::error title=pod install failed::non-retriable failure"
            exit 1
          fi
          echo "::warning title=pod install retry::CocoaPods specs are stale; running pod repo update and retrying"
          pod repo update
          pod install
      - name: Configure App ID and API Token
        run: |
          sed -i .bak 's/YOUR_API_KEY/${{ secrets.FLUTTER_TEST_IOS_APP_ID }}/' ios/Embrace-Info.plist
          sed -i .bak 's/YOUR_API_KEY/${{ secrets.FLUTTER_TEST_IOS_APP_ID }}/' ios/Runner.xcodeproj/project.pbxproj
          sed -i .bak 's/YOUR_API_TOKEN/${{ secrets.FLUTTER_TEST_IOS_API_TOKEN }}/' ios/Embrace-Info.plist
          sed -i .bak 's/YOUR_API_TOKEN/${{ secrets.FLUTTER_TEST_IOS_API_TOKEN }}/' ios/Runner.xcodeproj/project.pbxproj
      - name: Create & Boot iOS Simulator (prefer iOS 17.x or 18.x)
        id: boot-sim
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl shutdown all || true
          xcrun simctl erase all || true

          # Prefer iOS 17.*, then 18.*, avoid iOS 26+ (UIScene required, breaks flutter drive)
          RUNTIME=""
          for PREFIX in "17." "18."; do
            RUNTIME=$(xcrun simctl list runtimes -j \
              | jq -r --arg p "$PREFIX" '.runtimes[] | select(.platform=="iOS" and .isAvailable==true and (.version|startswith($p))) | .identifier' \
              | sort -V | tail -n1)
            [[ -n "${RUNTIME:-}" ]] && break
          done
          if [[ -z "${RUNTIME:-}" ]]; then
            selected=$(xcodebuild -version 2>/dev/null | tr '\n' ' ')
            echo "::error title=No iOS runtime::no iOS 17.x or 18.x runtime found; ${selected}has no matching simulator runtime baked in"
            {
              echo "### ❌ No iOS 17.x/18.x simulator runtime available"
              echo ""
              echo "Selected Xcode: \`${selected}\`"
              echo ""
              echo "**Installed Xcode versions on this runner:**"
              echo '```'
              ls -d /Applications/Xcode_*.app 2>/dev/null || echo "(none found)"
              echo '```'
              echo "**Available runtimes:**"
              echo '```'
              xcrun simctl list runtimes
              echo '```'
              echo "**SDKs available in the selected Xcode:**"
              echo '```'
              xcodebuild -showsdks 2>/dev/null || echo "(xcodebuild -showsdks failed)"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Selected runtime: $RUNTIME"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro"
          UDID=$(xcrun simctl create "CI iPhone" "$DEVICE_TYPE" "$RUNTIME")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl status_bar "$UDID" override --time 9:41 || true
          xcrun simctl list devices | grep "$UDID"
      - name: Run iOS integration test
        timeout-minutes: 25
        env:
          SIM_UDID: ${{ steps.boot-sim.outputs.udid }}
        run: |
          set -o pipefail
          xcrun simctl bootstatus "$SIM_UDID" -b
          flutter devices || true

          # Sentinel-gated single retry: a transient "log reader failed unexpectedly"
          # error during debug-attach is the only known-flaky failure mode. Anything
          # else (compile error, test assertion, network) fails fast on attempt 1.
          attempts=0
          max_attempts=2
          while : ; do
            attempts=$((attempts + 1))
            log="$RUNNER_TEMP/flutter-test.attempt-$attempts.log"
            set +e
            flutter --verbose test integration_test/app_test.dart -d "$SIM_UDID" 2>&1 \
              | tee "$log" "$RUNNER_TEMP/flutter-test.log"
            status=${PIPESTATUS[0]}
            set -e
            [ "$status" -eq 0 ] && break
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error title=flutter test failed::$attempts attempts; last exit $status"
              exit "$status"
            fi
            if ! grep -q 'Error waiting for a debug connection' "$log"; then
              echo "::error title=flutter test failed::non-retriable failure (exit $status)"
              exit "$status"
            fi
            echo "::warning title=flutter test retry::debug-attach failure on attempt $attempts; resetting sim and retrying"
            # Reset the simulator to clear the host-side wedged `simctl spawn log
            # stream` file descriptor — the underlying Apple/CoreSimulator bug per
            # flutter/flutter#116248. Shutdown closes the FD; reboot leaves
            # app-install state intact (vs `erase`, which fresh-state correlates
            # with the failure per flutter/flutter#111167).
            echo "Shutting down simulator..."
            xcrun simctl shutdown "$SIM_UDID" || true
            echo "Booting simulator..."
            xcrun simctl boot "$SIM_UDID"
            echo "Waiting for simulator to be ready..."
            xcrun simctl bootstatus "$SIM_UDID" -b
            echo "Simulator reset complete; retrying"
          done
      - name: Surface failure summary
        if: failure() || cancelled()
        env:
          SELECTED_RUNTIME: ${{ steps.boot-sim.outputs.runtime }}
          SIM_UDID: ${{ steps.boot-sim.outputs.udid }}
        run: |
          {
            echo "### iOS job diagnostics"
            echo ""
            echo "**Selected runtime**: ${SELECTED_RUNTIME:-unknown}"
            echo "**Simulator UDID**: ${SIM_UDID:-unknown}"
            echo ""
            echo "#### Booted devices at failure time"
            echo '```'
            xcrun simctl list devices booted 2>&1 || true
            echo '```'
            echo ""
            echo "#### Live processes"
            echo '```'
            # shellcheck disable=SC2009  # need etime to spot hung procs; pgrep doesn't expose it
            ps -axo pid,etime,command | grep -E 'flutter|dart|xcodebuild|Simulator|launchd_sim' | grep -v grep || true
            echo '```'
            echo ""
            echo "#### Last 100 lines of flutter test"
            echo '```'
            tail -n 100 "$RUNNER_TEMP/flutter-test.log" 2>/dev/null || echo "(no log captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload iOS diagnostics
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/flutter-test.log
            ${{ runner.temp }}/flutter-test.attempt-*.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Shutdown simulator
        if: always()
        timeout-minutes: 2
        run: xcrun simctl shutdown all || true


  pana:
    defaults:
      run:
        working-directory: embrace
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true
      - name: ⬇️ Pub Get
        run: flutter pub get
      - name: 📦 Install Pana
        run: flutter pub global activate pana
      - name: 📊 Verify Pana Score
        run: |
          PANA=$(pana . --no-warning --dartdoc-version 8.3.4); PANA_SCORE=$(echo $PANA | sed -n "s/.*Points: \([0-9]*\)\/\([0-9]*\)./\1\/\2/p")
          echo "Score: $PANA_SCORE"
          IFS='/'; read -a SCORE_ARR <<< "$PANA_SCORE"; SCORE=${SCORE_ARR[0]}
          if (( SCORE < 70 )); then echo "The minimum score of 70 was not met!"; exit 1; fi
